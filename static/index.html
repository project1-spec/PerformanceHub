    // ============================================================================
    // Auth Context
    // ============================================================================
    const AuthContext = createContext(null);

    const AuthProvider = ({ children }) => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const checkAuth = async () => {
          try {
            const res = await fetch('/api/auth/me');
            if (res.ok) {
              const data = await res.json();
              setUser(data);
            } else {
              setUser(null);
            }
          } catch (err) {
            console.error('Auth check failed:', err);
            setUser(null);
          } finally {
            setLoading(false);
          }
        };

        checkAuth();
      }, []);

      const login = async (email, password) => {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        if (!res.ok) {
          throw new Error('Login failed');
        }

        const data = await res.json();
        setUser(data);
        return data;
      };

      const register = async (name, email, password) => {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        if (!res.ok) {
          throw new Error('Registration failed');
        }

        const data = await res.json();
        setUser(data);
        return data;
      };

      const logout = async () => {
        await fetch('/api/auth/logout', { method: 'POST' });
        setUser(null);
        window.location.hash = '#/login';
      };

      return (
        <AuthContext.Provider value={{ user, setUser, loading, login, register, logout }}>
          {children}
        </AuthContext.Provider>
      );
    };

    const useAuth = () => useContext(AuthContext);

    );

    );

const LoginPage = () => {
      const [email, setEmail] = useState('demo@performancehub.com');
      const [password, setPassword] = useState('demo123');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { login } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        try {
          await login(email, password);
          window.location.hash = '#/dashboard';
        } catch (err) {
          setError(err.message || 'Login failed');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-[#0f172a] flex items-center justify-center p-4">

            <p className="text-gray-400 mb-6">Fitness Analytics Platform</p>

            {error && (
              <div className="bg-red-900/30 border border-red-500/30 text-red-300 px-4 py-3 rounded mb-4">
                {error}

            )}

            <form onSubmit={handleSubmit} className="space-y-4">

                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="demo@performancehub.com"
                  className="w-full px-4 py-2 border border-white/10 rounded-lg bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

                <label className="block text-gray-300 font-medium mb-2">Password</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="demo123"

                  required
                />
              </div>

              <button
                type="submit"
                disabled={loading}
                className="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-2 px-4 rounded-lg transition disabled:opacity-50"

                    <div className="relative flex justify-center text-sm"><span className="px-2 bg-gray-800 text-gray-400">Or continue with</span></div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <button type="button" onClick={() => alert('Google SSO coming soon!')} className="flex items-center justify-center gap-2 w-full py-2.5 px-4 bg-white text-gray-800 rounded-lg font-medium hover:bg-gray-100 transition" title="Coming soon">
                      <svg className="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                      Google
                    </button>
                    <button type="button" onClick={() => alert('Apple SSO coming soon!')} className="flex items-center justify-center gap-2 w-full py-2.5 px-4 bg-black text-white rounded-lg font-medium hover:bg-gray-900 transition border border-gray-700" title="Coming soon">
                      <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                      Apple
                    </button>
                  </div>
                </div>
            </form>

            <p className="text-center text-gray-400 mt-6">
              Don't have an account?{' '}
              <a href="#/register" className="text-primary-600 hover:text-primary-700 font-medium">
                Sign Up
              </a>
            </p>
          </div>
        </div>
      );
    };

    // Register Page
    const RegisterPage = () => {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { register } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        if (password !== confirmPassword) {
          setError('Passwords do not match');
          return;
        }

        setLoading(true);

        try {
          await register(name, email, password);
          window.location.hash = '#/';
        } catch (err) {
          setError(err.message || 'Registration failed');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-[#0f172a] flex items-center justify-center p-4">
          <div className="glass-card rounded-2xl shadow-2xl w-full max-w-md p-8">
            <h1 className="text-3xl font-bold text-primary-900 mb-2">PerformanceHub</h1>
            <p className="text-gray-400 mb-6">Create Your Account</p>

            {error && (
              <div className="bg-red-900/30 border border-red-500/30 text-red-300 px-4 py-3 rounded mb-4">
                {error}
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-gray-300 font-medium mb-2">Full Name</label>
                <input
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="John Doe"
                  className="w-full px-4 py-2 border border-white/10 rounded-lg bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <div>
                <label className="block text-gray-300 font-medium mb-2">Email</label>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="your@email.com"
                  className="w-full px-4 py-2 border border-white/10 rounded-lg bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <div>
                <label className="block text-gray-300 font-medium mb-2">Password</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full px-4 py-2 border border-white/10 rounded-lg bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <div>
                <label className="block text-gray-300 font-medium mb-2">Confirm Password</label>
                <input
                  type="password"
                  value={confirmPassword}
                  onChange={(e) => setConfirmPassword(e.target.value)}
                  className="w-full px-4 py-2 border border-white/10 rounded-lg bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <button
                type="submit"
                disabled={loading}
                className="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-2 px-4 rounded-lg transition disabled:opacity-50"
              >
                {loading ? <span className="spinner" /> : 'Create Account'}
              </button>
            </form>

            <p className="text-center text-gray-400 mt-6">
              Already have an account?{' '}
              <a href="#/login" className="text-primary-600 hover:text-primary-700 font-medium">
                Sign In
              </a>
            </p>
          </div>
        </div>
      );
    };

    // Dashboard Page
    const DashboardPage = () => {
      const { user } = useAuth();
      const [dashboardData, setDashboardData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [syncing, setSyncing] = useState(false);

      const fetchDashboard = async () => {
        try {
          const res = await fetch('/api/dashboard');
          if (!res.ok) throw new Error('Failed to fetch dashboard');
          const data = await res.json();
          console.log('[Dashboard] API response:', JSON.stringify(data, null, 2));
          setDashboardData(data);
          return data;
        } catch (err) {
          console.error('[Dashboard] Fetch error:', err);
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleSync = async () => {
        setSyncing(true);
        try {
          const platforms = (dashboardData?.connectedPlatforms || []).map(p => p.platform);
          console.log('[Dashboard] Syncing platforms:', platforms);
          for (const p of platforms) {
            try {
              const res = await fetch(`/api/sync/${p}`, { method: 'POST' });
              const result = await res.json();
              console.log(`[Dashboard] Sync ${p}:`, result);
            } catch (e) { console.error(`[Dashboard] Sync ${p} failed:`, e); }
          }
          await fetchDashboard();
        } finally { setSyncing(false); }
      };

      useEffect(() => {
        fetchDashboard().then(dashData => {
          // Auto-sync if connected platforms exist but last sync was >5 min ago
          if (dashData && dashData.connectedPlatforms && dashData.connectedPlatforms.length > 0) {
            const lastSync = dashData.lastSynced ? new Date(dashData.lastSynced).getTime() : 0;
            const fiveMinAgo = Date.now() - 5 * 60 * 1000;
            if (lastSync < fiveMinAgo) {
              handleSync();
            }
          }
        }).catch(() => {});
      }, []);

      if (loading) {
        return (<div className="space-y-6 p-4 animate-pulse">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              {[1,2,3,4].map(i => <div key={i} className="bg-gray-800/50 rounded-xl p-6 h-32"><div className="h-4 bg-gray-700 rounded w-1/2 mb-3"></div><div className="h-8 bg-gray-700 rounded w-3/4"></div></div>)}
            </div>
            <div className="bg-gray-800/50 rounded-xl p-6 h-64"><div className="h-4 bg-gray-700 rounded w-1/3 mb-4"></div><div className="h-full bg-gray-700 rounded"></div></div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {[1,2].map(i => <div key={i} className="bg-gray-800/50 rounded-xl p-6 h-48"><div className="h-4 bg-gray-700 rounded w-1/2 mb-3"></div><div className="h-full bg-gray-700 rounded"></div></div>)}
            </div>
          </div>);
      }
      if (error) {
        return (<div className="flex flex-col items-center justify-center min-h-[40vh] text-center p-8">
            <div className="w-16 h-16 rounded-full bg-red-900/30 flex items-center justify-center mb-4"><Icons.AlertTriangle size={32} className="text-red-400" /></div>
            <h3 className="text-lg font-semibold text-white mb-2">Something went wrong</h3>
            <p className="text-gray-400 mb-4 max-w-md">{error || 'Failed to load dashboard data. Please check your connection and try again.'}</p>
            <button onClick={() => { setError(null); setLoading(true); fetchDashboard(); }} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition">Try Again</button>
          </div>);
      }

      const data = dashboardData || {};

      // Source Badge component
      const SourceBadge = ({ source }) => {
        if (!source) return null;
        const configs = {
          strava: { bg: 'bg-orange-500/20', text: 'text-orange-400', label: 'Strava' },
          whoop: { bg: 'bg-teal-500/20', text: 'text-teal-400', label: 'WHOOP' },
          manual: { bg: 'bg-gray-500/20', text: 'text-gray-400', label: 'Manual' },
        };
        const cfg = configs[source] || configs.manual;
        return (<span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold ${cfg.bg} ${cfg.text}`}>{cfg.label}</span>);
      };

      // Circular Gauge SVG
      const CircularGauge = ({ score, color, gradientId, size = 140 }) => {
        const sw = 10, r = (size - sw) / 2, circ = 2 * Math.PI * r;
        const progress = score != null ? (score / 100) * circ : 0;
        const track = 'rgba(255,255,255,0.08)';
        return (
          <svg width={size} height={size} className="transform -rotate-90">
            <defs><linearGradient id={gradientId} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={color} stopOpacity="1" /><stop offset="100%" stopColor={color} stopOpacity="0.5" /></linearGradient></defs>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={sw} />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={score != null ? `url(#${gradientId})` : track} strokeWidth={sw} strokeDasharray={circ} strokeDashoffset={circ - progress} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
          </svg>
        );
      };

      // Real data from API
      const recovery = (() => {
          // First try direct API recovery data
          const apiRec = data.recovery || {};
          if (apiRec.percentage != null) {
            return {
              percentage: apiRec.percentage,
              hrv: apiRec.hrv || null,
              rhr: apiRec.rhr || null,
              sleepHours: apiRec.sleepHours || null,
              source: apiRec.source || null
            };
          }
          // Fallback to trendData
          const td = data.trendData || [];
          const withRec = td.filter(t => t.recovery !== null && t.recovery !== undefined);
          const latest = withRec.length > 0 ? withRec[withRec.length - 1] : {};
          const withSleep = td.filter(t => t.sleep !== null && t.sleep !== undefined);
          const latestSleep = withSleep.length > 0 ? withSleep[withSleep.length - 1] : {};
          return {
            percentage: latest.recovery != null ? latest.recovery : null,
            hrv: latest.hrv != null ? latest.hrv : null,
            rhr: latest.rhr != null ? latest.rhr : null,
            sleepHours: latestSleep.sleep != null ? latestSleep.sleep : null,
          };
        })()
        const stepsStrain = (() => {
          const td = data.trendData || [];
          const withStrain = td.filter(t => t.strain != null);
          const latest = withStrain.length > 0 ? withStrain[withStrain.length - 1] : {};
          return { strain: latest.strain != null ? latest.strain : null };
        })();
        data.stepsStrain = stepsStrain;
      const workouts = data.workouts || {};
      const nutrition = data.nutrition || {};
      const dataSources = data.dataSources || {};

      // Pillar scores based on real data only
      const exerciseScore = workouts.completed != null ? Math.min(100, Math.round((workouts.completed / (workouts.goal || 20)) * 100)) : null;
      const recoveryScore = recovery.percentage;
      const nutritionScore = nutrition.calories != null ? Math.min(100, Math.round((nutrition.calories / 800) * 100)) : null;
      const mindsetScore = null;

      const pillars = [
        { name: 'Exercise', score: exerciseScore, color: '#22c55e', gradient: 'gaugeGreen', icon: '\u{1F3CB}',
          source: dataSources.strava?.connected ? 'strava' : null,
          metrics: [
            { label: 'Strain', value: stepsStrain.strain != null ? String(Math.round(stepsStrain.strain * 10) / 10) : null, source: stepsStrain.strain != null ? 'whoop' : null },
            { label: 'Workouts', value: workouts.completed != null ? String(workouts.completed) : null, source: dataSources.strava?.connected ? 'strava' : null },
            { label: 'Distance', value: data.stats?.distance != null ? `${data.stats.distance}mi` : null, source: dataSources.strava?.connected ? 'strava' : null },
            { label: 'Active Min', value: null, source: null },
          ]
        },
        { name: 'Recovery', score: recoveryScore, color: '#3b82f6', gradient: 'gaugeBlue', icon: '\u{1F4A4}',
          source: dataSources.whoop?.connected ? 'whoop' : null,
          metrics: [
            { label: 'Recovery', value: recoveryScore != null ? `${recoveryScore}%` : null, source: recovery.source },
            { label: 'HRV', value: recovery.hrv != null ? `${Math.round(recovery.hrv)}ms` : null, source: recovery.source },
            { label: 'Resting HR', value: recovery.rhr != null ? `${recovery.rhr}bpm` : null, source: recovery.source },
            { label: 'Sleep', value: recovery.sleepHours != null ? `${recovery.sleepHours}h` : null, source: recovery.source },
          ]
        },
        { name: 'Nutrition', score: nutritionScore, color: '#f59e0b', gradient: 'gaugeOrange', icon: '\u{1F34E}',
          source: null,
          metrics: [
            { label: 'Calories', value: nutrition.calories != null ? String(nutrition.calories) : null, source: nutrition.source },
            { label: 'Protein', value: nutrition.protein != null ? `${nutrition.protein}g` : null, source: nutrition.source },
            { label: 'Hydration', value: null, source: null },
            { label: 'Quality', value: null, source: null },
          ]
        },
        { name: 'Mindset', score: mindsetScore, color: '#a855f7', gradient: 'gaugePurple', icon: '\u{1F9E0}',
          source: null,
          metrics: [
            { label: 'Stress', value: null, source: null },
            { label: 'Mindfulness', value: null, source: null },
            { label: 'Mood', value: null, source: null },
            { label: 'Focus', value: null, source: null },
          ]
        },
      ];

      // Trends from real recovery data
      const pillarTrendData = data.trends && data.trends.length > 0
        ? data.trends.map(t => {
            const d = t.date ? new Date(t.date) : null;
            const dayName = d ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] : t.date;
            return { name: dayName, recovery: t.recovery_score };
          }).reverse()
        : null;

      return (
        <div className="space-y-6 animate-fade-in">
          {/* Header */}
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-3xl font-extrabold gradient-text">Welcome back, {user?.name || 'Athlete'}</h1>
              <p className="text-gray-400 text-sm mt-1">Here's your performance overview</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => window.location.hash = '#/workouts'} className="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold py-2 px-4 rounded-lg transition flex items-center gap-2">
                <Icons.Plus /> Log Workout
              </button>
              <button onClick={handleSync} disabled={syncing} className="glass-card hover:bg-white/10 text-white text-sm font-semibold py-2 px-4 rounded-lg transition flex items-center gap-2 border border-white/10 disabled:opacity-50">
                <Icons.RefreshCw className={syncing ? 'animate-spin' : ''} /> {syncing ? 'Syncing...' : 'Sync'}
              </button>
            </div>
          </div>
          {data.lastSynced && (
            <p className="text-xs text-gray-400 mt-1">Last synced: {new Date(data.lastSynced).toLocaleString()}</p>
          )}

          {/* Connected integrations status */}
          <div className="flex gap-2 flex-wrap">
            {(data.connectedPlatforms || []).map((p, i) => (
              <div key={i} className="flex items-center gap-2 bg-green-500/10 border border-green-500/20 rounded-full px-3 py-1">
                <div className="w-2 h-2 rounded-full bg-green-400" />
                <span className="text-xs font-medium text-green-400">{p.platform.charAt(0).toUpperCase() + p.platform.slice(1)} connected</span>
              </div>
            ))}
            {(!data.connectedPlatforms || data.connectedPlatforms.length === 0) && (
              <div className="flex items-center gap-2 bg-yellow-500/10 border border-yellow-500/20 rounded-full px-3 py-1">
                <span className="text-xs font-medium text-yellow-400">No integrations connected Ã¢ÂÂ go to Settings to connect WHOOP or Strava</span>
              </div>
            )}
          </div>

          {/* 4 PILLAR SCORE CARDS */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            {pillars.map((pillar, idx) => (
              <div key={idx} className="glass-card rounded-2xl p-5 text-center relative overflow-hidden group hover:scale-[1.02] transition-transform duration-300" style={{borderTop: `3px solid ${pillar.score != null ? pillar.color : '#4b5563'}`}}>
                {pillar.score != null && (<div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500" style={{background: `radial-gradient(circle at 50% 0%, ${pillar.color}15, transparent 70%)`}} />)}
                <div className="relative z-10">
                  <div className="flex items-center justify-center gap-2 mb-3">
                    <span className="text-lg">{pillar.icon}</span>
                    <h3 className="text-sm font-bold text-white uppercase tracking-wider">{pillar.name}</h3>
                    <SourceBadge source={pillar.source} />
                  </div>
                  <div className="relative inline-flex items-center justify-center mb-3">
                    <CircularGauge score={pillar.score} color={pillar.color} gradientId={pillar.gradient} />
                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                      {pillar.score != null ? (
                        <><span className="text-3xl font-black text-white">{pillar.score}</span><span className="text-[10px] text-gray-400 font-medium uppercase">Score</span></>
                      ) : (
                        <span className="text-sm text-gray-500 italic">No data</span>
                      )}
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-2 mt-2">
                    {pillar.metrics.map((m, mi) => (
                      <div key={mi} className="text-left bg-white/5 rounded-lg px-2 py-1.5">
                        <p className="text-[10px] text-gray-400">{m.label}</p>
                        <div className="flex items-center gap-1">
                          {m.value != null ? (
                            <><p className="text-sm font-bold text-white">{m.value}</p><SourceBadge source={m.source} /></>
                          ) : (
                            <p className="text-sm text-gray-500 italic">{'\u2014'}</p>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* AI READINESS */}
          <div className="glass-card rounded-2xl p-6">
            <h2 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
              <span className="text-xl">{'\u{1F9E0}'}</span> AI Readiness Insights
            </h2>
            {data.readiness?.forecast ? (
              <>
                <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                  {data.readiness.forecast.map((day, idx) => (
                    <div key={idx} className="flex flex-col items-center gap-2 min-w-fit">
                      <span className="text-xs font-medium text-gray-400">{day.day}</span>
                      <span className={`px-3 py-1 rounded-full text-sm font-bold text-white ${day.score >= 80 ? 'bg-green-500/80' : day.score >= 65 ? 'bg-yellow-500/80' : 'bg-orange-500/80'}`}>{day.score}</span>
                    </div>
                  ))}
                </div>
                <p className="text-xs text-gray-400 mb-3">Based on real WHOOP recovery data</p>
              </>
            ) : (
              <div className="text-center py-6">
                <p className="text-gray-500 italic">No readiness data available</p>
                <p className="text-xs text-gray-400 mt-1">Connect WHOOP and sync to see your readiness forecast</p>
              </div>
            )}
            {data.readiness?.tip && (
              <p className="text-sm text-gray-300">{'\u{1F4A1}'} <strong className="text-white">AI Tip:</strong> {data.readiness.tip}</p>
            )}
          </div>

          {/* PERFORMANCE TRENDS */}
          <div className="glass-card rounded-2xl p-6">
            <h2 className="text-lg font-bold text-white mb-4">Performance Trends</h2>
            {pillarTrendData && pillarTrendData.length > 0 ? (
              <ResponsiveContainer width="100%" height={280}>
                <AreaChart data={pillarTrendData}>
                  <defs><linearGradient id="trendRecovery" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.3} /><stop offset="95%" stopColor="#3b82f6" stopOpacity={0} /></linearGradient></defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" />
                  <XAxis dataKey="name" stroke="#64748b" tick={{fontSize:12}} />
                  <YAxis stroke="#64748b" tick={{fontSize:12}} domain={[0, 100]} />
                  <Tooltip contentStyle={{backgroundColor:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'12px', color:'#fff'}} />
                  <Legend />
                  <Area type="monotone" dataKey="recovery" name="Recovery (WHOOP)" stroke="#3b82f6" fillOpacity={1} fill="url(#trendRecovery)" strokeWidth={2} />
                </AreaChart>
              </ResponsiveContainer>
            ) : (
              <div className="text-center py-12">
                <p className="text-gray-500 italic">No trend data available</p>
                <p className="text-xs text-gray-400 mt-1">Sync your connected integrations to see trends over time</p>
              </div>
            )}
          </div>

          {/* DETAILED BREAKDOWNS */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="glass-card rounded-2xl p-6" style={{borderLeft: '3px solid #22c55e'}}>
              <h3 className="text-base font-bold text-white mb-3 flex items-center gap-2">
                {'\u{1F3CB}'} Exercise Details
                {dataSources.strava?.connected && <SourceBadge source="strava" />}
              </h3>
              {data.goals && data.goals.length > 0 ? (
                <div className="space-y-3">
                  {data.goals.slice(0, 3).map((goal, idx) => {
                    const current = goal.current_value || 0;
                    const target = goal.target_value || 1;
                    const pct = Math.min(100, Math.round((current / target) * 100));
                    return (

            Error: {error}
          </div>
        );
      }

      const data = reportsData || {};

      const renderGauge = (score, label, status) => {
        const color = score >= 75 ? '#10B981' : score >= 65 ? '#FBBF24' : '#EF4444';
        const cx = 70, cy = 70, r = 60, thickness = 15;
        const innerR = r - thickness;
        const pct = Math.min(100, Math.max(0, score)) / 100;
        const describeArc = (startDeg, endDeg, outerR, innerRadius) => {
          const toRad = (d) => (d * Math.PI) / 180;
          const sx = cx + outerR * Math.cos(toRad(startDeg));
          const sy = cy - outerR * Math.sin(toRad(startDeg));
          const ex = cx + outerR * Math.cos(toRad(endDeg));
          const ey = cy - outerR * Math.sin(toRad(endDeg));
          const ix = cx + innerRadius * Math.cos(toRad(endDeg));
          const iy = cy - innerRadius * Math.sin(toRad(endDeg));
          const isx = cx + innerRadius * Math.cos(toRad(startDeg));
          const isy = cy - innerRadius * Math.sin(toRad(startDeg));
          const sweep = startDeg - endDeg;
          const largeArc = sweep > 180 ? 1 : 0;
          return [
            `M ${sx} ${sy}`,
            `A ${outerR} ${outerR} 0 ${largeArc} 1 ${ex} ${ey}`,
            `L ${ix} ${iy}`,
            `A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${isx} ${isy}`,
            'Z'
          ].join(' ');
        };
        const bgPath = describeArc(180, 0, r, innerR);
        const endAngle = 180 - (pct * 180);
        const valuePath = pct > 0 ? describeArc(180, Math.max(0, endAngle), r, innerR) : '';

        return (
          <div className="glass-card rounded-2xl p-6">
            <div className="flex flex-col items-center">
              <div style={{ position: 'relative', width: 140, height: 80 }}>
                <svg width="140" height="80" viewBox="0 0 140 80">
                  <path d={bgPath} fill="#e5e7eb" />
                  {pct > 0 && <path d={valuePath} fill={color} />}
                </svg>
                <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, textAlign: 'center' }}>
                  <span className="text-3xl font-bold text-white">{score}</span>
                </div>
              </div>
              <span className="text-sm font-medium text-gray-400 mt-1">{label}</span>
              {status && (
                <span className="mt-2 bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded">
                  {status}
                </span>
              )}
            </div>
          </div>
        );
      };

      return (
        <div className="space-y-6">
          {/* Header */}
          <div className="flex items-center justify-between">
            <h1 className="text-3xl font-bold text-white">Reports</h1>

              )
            ),
            React.createElement('div', {className: 'grid grid-cols-3 gap-2 mt-3'},
              React.createElement('div', {className: 'text-center p-2 bg-gray-700/50 rounded-lg'},
                React.createElement('div', {className: 'text-lg font-bold ' + (a.recovery >= 70 ? 'text-emerald-400' : a.recovery >= 40 ? 'text-yellow-400' : 'text-red-400')}, a.recovery != null ? a.recovery + '%' : '--'),
                React.createElement('div', {className: 'text-xs text-gray-400'}, 'Recovery')
              ),
              React.createElement('div', {className: 'text-center p-2 bg-gray-700/50 rounded-lg'},
                React.createElement('div', {className: 'text-lg font-bold text-blue-400'}, a.activityCount || 0),
                React.createElement('div', {className: 'text-xs text-gray-400'}, 'Activities')
              ),
              React.createElement('div', {className: 'text-center p-2 bg-gray-700/50 rounded-lg'},
                React.createElement('div', {className: 'text-lg font-bold text-purple-400'}, a.activeGoals || 0),
                React.createElement('div', {className: 'text-xs text-gray-400'}, 'Goals')
              )
            )
          ))
        ),
        athletes.length === 0 && React.createElement('div', {className: 'text-center py-16 text-gray-400'},
          React.createElement(Icons.Users, {size: 48, className: 'mx-auto mb-4 opacity-50'}),
          React.createElement('p', {className: 'text-lg'}, 'No athletes found'),
          React.createElement('p', {className: 'text-sm mt-1'}, 'Athletes will appear here once they join the platform.')
        )
      );
    };

const App = () => {
      const { user, loading } = useAuth();
      const [currentHash, setCurrentHash] = useState(window.location.hash);
      const [notificationCount, setNotificationCount] = useState(3);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
    const [user, setUser] = useState(null);
    const [authChecked, setAuthChecked] = useState(false);

    // Check auth on mount
    useEffect(() => {
      fetch('/api/auth/me', { credentials: 'include' })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(u => { setUser(u); setAuthChecked(true); })
        .catch(() => { setUser(null); setAuthChecked(true); });
    }, []);

    // Logout handler
    const handleLogout = () => {
      fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
        .then(() => { setUser(null); window.location.hash = '#/login'; })
        .catch(() => { setUser(null); window.location.hash = '#/login'; });
    };


      useEffect(() => {
        const handleHashChange = () => {
          setCurrentHash(window.location.hash);
          setMobileMenuOpen(false);
        };

        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-white">
            <div className="spinner" />
          </div>
        );
      }

      // Route to appropriate page
      const page = currentHash.slice(2) || '/';

      if (!user && page !== 'login' && page !== 'register') {
        return <LoginPage />;
      }

      if (!user) {
        if (page === 'register') {
          return <RegisterPage />;
        }
      if (page === 'coach-dashboard') {
        return React.createElement(CoachDashboardPage);
      }
        return <LoginPage />;
      }

      // Authenticated pages
      const renderPage = () => {
        if (page === '/' || page === '' || page === 'dashboard') return <DashboardPage />;
        if (page === 'workouts') return <WorkoutsPage />;
        if (page === 'reports') return <ReportsPage />;
        if (page === 'goals') return <GoalsPage />;
        if (page === 'groups') return <GroupsPage />;
        if (page === 'feed') return <FeedPage />;
        if (page === 'analyze') return <AnalyzePage />;
        if (page === 'settings') return <SettingsPage />;
      if (page === 'register') {
        return React.createElement(RegisterPage);
      }
        return <DashboardPage />;
      };

      return (
        <div className="min-h-screen bg-[#0f172a]">
          {/* Top Navigation Bar */}
          <nav className="bg-[#1e293b]/90 backdrop-blur-md text-white shadow-lg sticky top-0 z-50 border-b border-white/5">
            <div className="px-4 sm:px-6 py-4">
              <div className="flex items-center justify-between">
                {/* Logo - clickable to navigate to dashboard */}
                <a href="#/dashboard" onClick={(e) => { e.preventDefault(); window.location.hash = '#/dashboard'; }} className="flex items-center gap-2 font-bold text-xl hover:opacity-90 transition cursor-pointer" style={{textDecoration:'none',color:'inherit'}}>
                  <Icons.Activity />
                  PerformanceHub
                </a>

                {/* Nav Links */}
                <div className="flex items-center gap-6">
                  {[
                    { href: '/dashboard', label: 'Dashboard' },
                    { href: '/workouts', label: 'Workouts' },
                    { href: '/reports', label: 'Reports' },
                    { href: '/goals', label: 'Goals' },
                    { href: '/groups', label: 'Groups' },
                    { href: '/feed', label: 'Feed' },
                    { href: '/analyze', label: 'Analyze' },
                  ].map(({ href, label }) => {
                    const isActive = currentHash === `#${href}` || (href === '/dashboard' && (currentHash === '' || currentHash === '#/' || currentHash === '#' || currentHash === '#/dashboard'));

                    return (
                      <a
                        key={href}
                        href={`#${href}`}
                        className={`text-sm font-medium transition px-2 py-3 min-h-[44px] inline-flex items-center ${
                          isActive
                            ? 'text-white'
                            : 'text-blue-300 hover:text-white'
                        } hidden md:inline-flex`}
                      >
                        {label}
                      </a>
                    );
                  })}
                </div>

                {/* Right Side: Notification, Settings, User, Hamburger */}
                <div className="flex items-center gap-4">
                  {/* Mobile hamburger */}
                  <button
                    className="md:hidden text-white p-2 min-w-[44px] min-h-[44px] flex items-center justify-center -mr-2"
                    onClick={() => setMobileMenuOpen(prev => !prev)}
                    aria-label="Toggle menu"
                    aria-expanded={mobileMenuOpen}
                  >
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      {mobileMenuOpen
                        ? <path d="M18 6L6 18M6 6l12 12" />
                        : <><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></>
                      }
                    </svg>
                  </button>

                  <button onClick={() => alert(`You have ${notificationCount} unread notifications. Notification center coming soon!`)} className="relative hidden sm:block">
                    <Icons.Bell />
                    {notificationCount > 0 && (
                      <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">
                        {notificationCount}
                      </span>
                    )}
                  </button>

                  <a href="#/settings" className="hover:text-blue-100 transition hidden sm:block">
                    <Icons.Settings />
                  </a>

                  <div className="flex items-center gap-2 border-l border-blue-400 pl-4">
                    <div className="w-8 h-8 rounded-full bg-blue-300 text-primary-900 text-xs font-bold flex items-center justify-center">
                      {user.name
                        .split(' ')
                        .map((n) => n[0])
                        .join('')}
                    </div>
                    <span className="text-sm hidden sm:inline">{user.name}</span>
                  </div>
                </div>
              </div>
            </div>

            {/* Mobile Nav Menu */}
            {mobileMenuOpen && (
              <div className="md:hidden bg-primary-700 px-6 py-3 space-y-2">
                {[
                  { href: '/dashboard', label: 'Dashboard' },
                  { href: '/workouts', label: 'Workouts' },
                  { href: '/reports', label: 'Reports' },
                  { href: '/goals', label: 'Goals' },
                  { href: '/groups', label: 'Groups' },
                  { href: '/feed', label: 'Feed' },
                  { href: '/analyze', label: 'Analyze' },
                  { href: '/settings', label: 'Settings' },
                ].map(({ href, label }) => {
                  const isActive = currentHash === `#${href}` || (href === '/dashboard' && (currentHash === '' || currentHash === '#/' || currentHash === '#' || currentHash === '#/dashboard'));
                  return (
                    <a
                      key={href}
                      href={`#${href}`}
                      className={`block py-3 px-2 min-h-[44px] text-sm font-medium transition ${isActive ? 'text-emerald-300 bg-emerald-600/20 rounded' : 'text-gray-400 hover:text-white'}`}
                    >
                      {label}
                    </a>
                  );
                })}
              </div>
            )}

            {/* Secondary Bar */}
            <div className="bg-primary-700 px-6 py-2 hidden md:flex items-center justify-between text-sm">
              <div className="flex items-center gap-4">
                <select className="bg-transparent text-white focus:outline-none text-xs">
                  <option>Last 7 Days</option>
                  <option>Last 30 Days</option>
                  <option>Last 90 Days</option>
                </select>
                <button onClick={() => window.location.reload()} className="text-blue-300 hover:text-white transition">
                  <Icons.RefreshCw />
                </button>
                <button onClick={() => alert('Data export initiated! Your report will download shortly.')} className="text-blue-300 hover:text-white transition">
                  <Icons.Download />
                </button>
              </div>

              <div className="flex items-center gap-4">
                <a href="#/settings" className="text-blue-300 hover:text-white transition text-xs">
                  Switch to Coach
                </a>
                <button
                  onClick={() => {
                    fetch('/api/auth/logout', { method: 'POST' })
                      .then(() => {
                        window.location.hash = '#/login';
                        window.location.reload();
                      })
                      .catch(console.error);
                  }}
                  className="text-blue-300 hover:text-white transition text-xs"
                >
                  Sign Out
                </button>
              </div>
            </div>
          </nav>

          {/* Main Content */}
          <main className="px-4 sm:px-6 py-4 sm:py-6">
            <div className="max-w-7xl mx-auto">
              {renderPage()}
            </div>
          </main>
        </div>
      );
    };

    // ============================================================================
    // Render App
    // ============================================================================

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AuthProvider>
        <App />
      </AuthProvider>
    );
  </script>

    <footer style="background: #111827; border-top: 1px solid #1f2937; padding: 16px 0; text-align: center; color: #6b7280; font-size: 13px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;">
      <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 24px;">
        <span>PerformanceHub v2.0</span>
        <span>&copy; 2026 PerformanceHub. All rights reserved.</span>
      </div>
    </footer>
    </body>
</html>
