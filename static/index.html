<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerformanceHub - Fitness Analytics</title>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2/umd/Recharts.min.js"></script>
  <script>
    // Capture Recharts components before Babel's var hoisting overwrites window globals
    window._RC = {};
    ['LineChart','Line','AreaChart','Area','BarChart','Bar','PieChart','Pie','Cell','XAxis','YAxis','CartesianGrid','Tooltip','Legend','ResponsiveContainer'].forEach(function(k) {
      window._RC[k] = window[k] || (window.Recharts && window.Recharts[k]);
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!--
    TODO [BUG-004 / Optimization]: @babel/standalone is used for in-browser JSX
    transpilation. For production, precompile JSX with a build step (Vite, esbuild,
    or Babel CLI) and serve plain JS. This adds ~1.5MB and ~300ms to initial load.
    See: https://babeljs.io/docs/babel-standalone#when-not-to-use-babelstandalone
  -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(46, 117, 182, 0.3);
      border-radius: 50%;
      border-top-color: #2E75B6;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .gauge-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>

    const { LineChart, Line, AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window._RC;

      Moon: () => (

      ),
    };

    // ============================================================================
    // Auth Context
    // ============================================================================
    const AuthContext = createContext(null);

    const AuthProvider = ({ children }) => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const checkAuth = async () => {
          try {
            const res = await fetch('/api/auth/me');
            if (res.ok) {
              const data = await res.json();
              setUser(data);
            } else {
              setUser(null);
            }
          } catch (err) {
            console.error('Auth check failed:', err);
            setUser(null);
          } finally {
            setLoading(false);
          }
        };

        checkAuth();
      }, []);

      const login = async (email, password) => {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        if (!res.ok) {
          throw new Error('Login failed');
        }

        const data = await res.json();
        setUser(data);
        return data;
      };

      const register = async (name, email, password) => {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        if (!res.ok) {
          throw new Error('Registration failed');
        }

        const data = await res.json();
        setUser(data);
        return data;
      };

      const logout = async () => {
        await fetch('/api/auth/logout', { method: 'POST' });
        setUser(null);
        window.location.hash = '#/login';
      };

      return (
        <AuthContext.Provider value={{ user, setUser, loading, login, register, logout }}>
          {children}
        </AuthContext.Provider>
      );
    };

    const useAuth = () => useContext(AuthContext);

    // ============================================================================
    // Pages
    // ============================================================================

    // Login Page
    const LoginPage = () => {
      const [email, setEmail] = useState('demo@performancehub.com');
      const [password, setPassword] = useState('demo123');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { login } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        try {
          await login(email, password);
          window.location.hash = '#/';
        } catch (err) {
          setError(err.message || 'Login failed');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-primary-900 via-primary-800 to-primary-600 flex items-center justify-center p-4">
          <div className="bg-white rounded-lg shadow-2xl w-full max-w-md p-8">
            <h1 className="text-3xl font-bold text-primary-900 mb-2">PerformanceHub</h1>
            <p className="text-gray-600 mb-6">Fitness Analytics Platform</p>

            {error && (
              <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4">
                {error}
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-gray-700 font-medium mb-2">Email</label>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="demo@performancehub.com"
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <div>
                <label className="block text-gray-700 font-medium mb-2">Password</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="demo123"
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <button
                type="submit"
                disabled={loading}
                className="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-2 px-4 rounded-lg transition disabled:opacity-50"
              >
                {loading ? <span className="spinner" /> : 'Sign In'}
              </button>
            </form>

            <p className="text-center text-gray-600 mt-6">
              Don't have an account?{' '}
              <a href="#/register" className="text-primary-600 hover:text-primary-700 font-medium">
                Sign Up
              </a>
            </p>
          </div>
        </div>
      );
    };

    // Register Page
    const RegisterPage = () => {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { register } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        if (password !== confirmPassword) {
          setError('Passwords do not match');
          return;
        }

        setLoading(true);

        try {
          await register(name, email, password);
          window.location.hash = '#/';
        } catch (err) {
          setError(err.message || 'Registration failed');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-primary-900 via-primary-800 to-primary-600 flex items-center justify-center p-4">
          <div className="bg-white rounded-lg shadow-2xl w-full max-w-md p-8">
            <h1 className="text-3xl font-bold text-primary-900 mb-2">PerformanceHub</h1>
            <p className="text-gray-600 mb-6">Create Your Account</p>

            {error && (
              <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4">
                {error}
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-gray-700 font-medium mb-2">Full Name</label>
                <input
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="John Doe"
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <div>
                <label className="block text-gray-700 font-medium mb-2">Email</label>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="your@email.com"
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <div>
                <label className="block text-gray-700 font-medium mb-2">Password</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <div>
                <label className="block text-gray-700 font-medium mb-2">Confirm Password</label>
                <input
                  type="password"
                  value={confirmPassword}
                  onChange={(e) => setConfirmPassword(e.target.value)}
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  required
                />
              </div>

              <button
                type="submit"
                disabled={loading}
                className="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-2 px-4 rounded-lg transition disabled:opacity-50"
              >
                {loading ? <span className="spinner" /> : 'Create Account'}
              </button>
            </form>

            <p className="text-center text-gray-600 mt-6">
              Already have an account?{' '}
              <a href="#/login" className="text-primary-600 hover:text-primary-700 font-medium">
                Sign In
              </a>
            </p>
          </div>
        </div>
      );
    };

    // Dashboard Page
    const DashboardPage = () => {
      const { user } = useAuth();
      const [dashboardData, setDashboardData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');

      useEffect(() => {
        const fetchDashboard = async () => {
          try {
            const res = await fetch('/api/dashboard');
            if (!res.ok) throw new Error('Failed to fetch dashboard');
            const data = await res.json();
            setDashboardData(data);
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        };

        fetchDashboard();
      }, []);

      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen">
            <div className="spinner" />
          </div>
        );
      }

      if (error) {
        return (
          <div className="p-4 bg-red-50 border border-red-200 text-red-700 rounded">
            Error: {error}
          </div>
        );
      }

      const data = dashboardData || {};

      return (
        <div className="space-y-6">
          {/* Header */}
          <div className="flex items-center justify-between">
            <h1 className="text-3xl font-bold text-gray-900">Welcome back, {user?.name}!</h1>
            {data.connectedPlatform && (
              <span className="bg-blue-100 text-primary-600 px-3 py-1 rounded-full text-sm font-medium">
                Connected: {data.connectedPlatform}
              </span>
            )}
          </div>

    const SettingsPage = () => {
      const [settingsData, setSettingsData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [tab, setTab] = useState('integrations');

      const [oauthMessage, setOauthMessage] = useState('');

      useEffect(() => {
        // Check for OAuth callback params
        const params = new URLSearchParams(window.location.search);
        const oauthSuccess = params.get('oauth_success');
        const oauthError = params.get('oauth_error');
        if (oauthSuccess) {
          setOauthMessage(`Successfully connected ${oauthSuccess}!`);
          // Clean up URL
          window.history.replaceState({}, '', '/');
        }
        if (oauthError) {
          setOauthMessage(`OAuth error: ${oauthError}`);
          window.history.replaceState({}, '', '/');
        }

        const fetchSettings = async () => {
          try {
            const res = await fetch('/api/settings');
            if (!res.ok) throw new Error('Failed to fetch settings');
            const data = await res.json();
            setSettingsData(data);
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        };

        fetchSettings();
      }, []);

      const handleConnect = async (platform) => {
        try {
          const res = await fetch(`/api/integrations/${platform}/connect`, {
            method: 'POST',
          });
          if (res.ok) {
            const result = await res.json();
            // If server returns a redirect URL (real OAuth), navigate to it
            if (result.redirect) {
              window.location.href = result.redirect;
              return;
            }
            // Otherwise refresh settings (mock connect)
            const res2 = await fetch('/api/settings');
            if (res2.ok) {
              const data = await res2.json();
              setSettingsData(data);
            }
          }
        } catch (err) {
          console.error('Connect failed:', err);
        }
      };

      const handleDisconnect = async (platform) => {
        try {
          const res = await fetch(`/api/integrations/${platform}`, {
            method: 'DELETE',
          });
          if (res.ok) {
            // Refresh settings
            const res2 = await fetch('/api/settings');
            if (res2.ok) {
              const data = await res2.json();
              setSettingsData(data);
            }

    // Main App
    // ============================================================================

    const App = () => {
      const { user, loading } = useAuth();
      const [currentHash, setCurrentHash] = useState(window.location.hash);
      const [notificationCount, setNotificationCount] = useState(3);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      useEffect(() => {
        const handleHashChange = () => {
          setCurrentHash(window.location.hash);
          setMobileMenuOpen(false);
        };

        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-white">
            <div className="spinner" />
          </div>
        );
      }

      // Route to appropriate page
      const page = currentHash.slice(2) || '/';

      if (!user && page !== 'login' && page !== 'register') {
        return <LoginPage />;
      }

      if (!user) {
        if (page === 'register') {
          return <RegisterPage />;
        }
        return <LoginPage />;
      }

      // Authenticated pages
      const renderPage = () => {
        if (page === '/' || page === '') return <DashboardPage />;
        if (page === 'workouts') return <WorkoutsPage />;
        if (page === 'reports') return <ReportsPage />;
        if (page === 'goals') return <GoalsPage />;
        if (page === 'groups') return <GroupsPage />;
        if (page === 'feed') return <FeedPage />;
        if (page === 'analyze') return <AnalyzePage />;
        if (page === 'settings') return <SettingsPage />;
        return <DashboardPage />;
      };

      return (
        <div className="min-h-screen bg-gray-50">
          {/* Top Navigation Bar */}
          <nav className="bg-primary-800 text-white shadow-lg sticky top-0 z-50">
            <div className="px-4 sm:px-6 py-4">
              <div className="flex items-center justify-between">
                {/* Logo */}
                <div className="flex items-center gap-2 font-bold text-xl">
                  <Icons.Activity />
                  PerformanceHub
                </div>

                {/* Nav Links */}
                <div className="flex items-center gap-6">
                  {[
                    { href: '/', label: 'Dashboard' },
                    { href: '/workouts', label: 'Workouts' },
                    { href: '/reports', label: 'Reports' },
                    { href: '/goals', label: 'Goals' },
                    { href: '/groups', label: 'Groups' },
                    { href: '/feed', label: 'Feed' },
                    { href: '/analyze', label: 'Analyze' },
                  ].map(({ href, label }) => {
                    const isActive = currentHash === `#${href}` || (href === '/' && (currentHash === '' || currentHash === '#/' || currentHash === '#'));

                    return (
                      <a
                        key={href}
                        href={`#${href}`}
                        className={`text-sm font-medium transition px-2 py-3 min-h-[44px] inline-flex items-center ${
                          isActive
                            ? 'text-white'
                            : 'text-blue-100 hover:text-white'
                        } hidden md:inline-flex`}
                      >
                        {label}
                      </a>
                    );
                  })}
                </div>

                {/* Right Side: Notification, Settings, User, Hamburger */}
                <div className="flex items-center gap-4">
                  {/* Mobile hamburger */}
                  <button
                    className="md:hidden text-white p-2 min-w-[44px] min-h-[44px] flex items-center justify-center -mr-2"
                    onClick={() => setMobileMenuOpen(prev => !prev)}
                    aria-label="Toggle menu"
                    aria-expanded={mobileMenuOpen}
                  >
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      {mobileMenuOpen
                        ? <path d="M18 6L6 18M6 6l12 12" />
                        : <><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></>
                      }
                    </svg>
                  </button>

                  <button className="relative hidden sm:block">
                    <Icons.Bell />
                    {notificationCount > 0 && (
                      <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">
                        {notificationCount}
                      </span>
                    )}
                  </button>

                  <a href="#/settings" className="hover:text-blue-100 transition hidden sm:block">
                    <Icons.Settings />
                  </a>

                  <div className="flex items-center gap-2 border-l border-blue-400 pl-4">
                    <div className="w-8 h-8 rounded-full bg-blue-300 text-primary-900 text-xs font-bold flex items-center justify-center">
                      {user.name
                        .split(' ')
                        .map((n) => n[0])
                        .join('')}
                    </div>
                    <span className="text-sm hidden sm:inline">{user.name}</span>
                  </div>
                </div>
              </div>
            </div>

            {/* Mobile Nav Menu */}
            {mobileMenuOpen && (
              <div className="md:hidden bg-primary-700 px-6 py-3 space-y-2">
                {[
                  { href: '/', label: 'Dashboard' },
                  { href: '/workouts', label: 'Workouts' },
                  { href: '/reports', label: 'Reports' },
                  { href: '/goals', label: 'Goals' },
                  { href: '/groups', label: 'Groups' },
                  { href: '/feed', label: 'Feed' },
                  { href: '/analyze', label: 'Analyze' },
                  { href: '/settings', label: 'Settings' },
                ].map(({ href, label }) => {
                  const isActive = currentHash === `#${href}` || (href === '/' && (currentHash === '' || currentHash === '#/' || currentHash === '#'));
                  return (
                    <a
                      key={href}
                      href={`#${href}`}
                      className={`block py-3 px-2 min-h-[44px] text-sm font-medium transition ${isActive ? 'text-white bg-primary-600 rounded' : 'text-blue-200 hover:text-white'}`}
                    >
                      {label}
                    </a>
                  );
                })}
              </div>
            )}

            {/* Secondary Bar */}
            <div className="bg-primary-700 px-6 py-2 hidden md:flex items-center justify-between text-sm">
              <div className="flex items-center gap-4">
                <select className="bg-transparent text-white focus:outline-none text-xs">
                  <option>Last 7 Days</option>
                  <option>Last 30 Days</option>
                  <option>Last 90 Days</option>
                </select>
                <button className="text-blue-100 hover:text-white transition">
                  <Icons.RefreshCw />
                </button>
                <button className="text-blue-100 hover:text-white transition">
                  <Icons.Download />
                </button>
              </div>

              <div className="flex items-center gap-4">
                <a href="#/settings" className="text-blue-100 hover:text-white transition text-xs">
                  Switch to Coach
                </a>
                <button
                  onClick={() => {
                    fetch('/api/auth/logout', { method: 'POST' })
                      .then(() => {
                        window.location.hash = '#/login';
                        window.location.reload();
                      })
                      .catch(console.error);
                  }}
                  className="text-blue-100 hover:text-white transition text-xs"
                >
                  Sign Out
                </button>
              </div>
            </div>
          </nav>

          {/* Main Content */}
          <main className="px-4 sm:px-6 py-4 sm:py-6">
            <div className="max-w-7xl mx-auto">
              {renderPage()}
            </div>
          </main>
        </div>
      );
    };

    // ============================================================================
    // Render App
    // ============================================================================

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AuthProvider>
        <App />
      </AuthProvider>
    );
  </script>
</body>
</html>
