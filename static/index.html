<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerformanceHub - Fitness Analytics</title>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/recharts@2/umd/Recharts.min.js"></script>
  <script>
    // Capture Recharts components before Babel's var hoisting overwrites window globals
    window._RC = {};
    ['LineChart','Line','AreaChart','Area','BarChart','Bar','PieChart','Pie','Cell','XAxis','YAxis','CartesianGrid','Tooltip','Legend','ResponsiveContainer'].forEach(function(k) {
      window._RC[k] = window[k] || (window.Recharts && window.Recharts[k]);
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',

              800: '#1e40af', 900: '#1e3a8a',

              400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
              800: '#1e293b', 900: '#0f172a', 950: '#020617',
            },
            accent: {
              teal: '#14b8a6', green: '#22c55e', purple: '#8b5cf6',
              orange: '#f97316', pink: '#ec4899', cyan: '#06b6d4',
            }

            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],

            '2xl': '1rem', '3xl': '1.5rem',

            'glow-blue': '0 0 20px rgba(59,130,246,0.15)',

            'glow-green': '0 0 20px rgba(34,197,94,0.15)',
            'glow-purple': '0 0 20px rgba(139,92,246,0.15)',
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: rgba(30,41,59,0.8);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-blue: #3b82f6;
      --accent-teal: #14b8a6;
      --accent-green: #22c55e;
      --accent-purple: #8b5cf6;
      --border-color: #334155;
      --glass-border: rgba(148,163,184,0.1);
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
      background: var(--bg-primary) !important;
      color: var(--text-primary) !important;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    .animate-slide-up { animation: slideUp 0.4s ease-out; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes gradientFlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .glass-card {
      background: var(--bg-card) !important;
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border) !important;
      border-radius: 16px !important;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .glass-card:hover {
      border-color: rgba(59,130,246,0.3) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }
    .gradient-text {
      background: linear-gradient(135deg, #3b82f6, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .progress-glow {
      background: linear-gradient(90deg, #3b82f6, #14b8a6, #3b82f6);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      border-radius: 999px;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    .stat-glow-blue { box-shadow: inset 0 0 0 1px rgba(59,130,246,0.2), 0 0 20px rgba(59,130,246,0.05); }
    .stat-glow-green { box-shadow: inset 0 0 0 1px rgba(34,197,94,0.2), 0 0 20px rgba(34,197,94,0.05); }
    .stat-glow-purple { box-shadow: inset 0 0 0 1px rgba(139,92,246,0.2), 0 0 20px rgba(139,92,246,0.05); }
    .stat-glow-teal { box-shadow: inset 0 0 0 1px rgba(20,184,166,0.2), 0 0 20px rgba(20,184,166,0.05); }
    .stat-glow-orange { box-shadow: inset 0 0 0 1px rgba(249,115,22,0.2), 0 0 20px rgba(249,115,22,0.05); }
    input, select, textarea {
      background: var(--bg-secondary) !important;
      border-color: var(--border-color) !important;
      color: var(--text-primary) !important;
    }
    input::placeholder { color: var(--text-muted) !important; }
  </style>
</head>

    // ============================================================================
    // Auth Context
    // ============================================================================
    const AuthContext = createContext(null);

    const AuthProvider = ({ children }) => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const checkAuth = async () => {
          try {
            const res = await fetch('/api/auth/me');
            if (res.ok) {
              const data = await res.json();
              setUser(data);
            } else {
              setUser(null);
            }
          } catch (err) {
            console.error('Auth check failed:', err);
            setUser(null);
          } finally {
            setLoading(false);
          }
        };

        checkAuth();
      }, []);

      const login = async (email, password) => {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        if (!res.ok) {
          throw new Error('Login failed');
        }

        const data = await res.json();
        setUser(data);
        return data;
      };

      const register = async (name, email, password) => {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        if (!res.ok) {
          throw new Error('Registration failed');
        }

        const data = await res.json();
        setUser(data);
        return data;
      };

      const logout = async () => {
        await fetch('/api/auth/logout', { method: 'POST' });
        setUser(null);
        window.location.hash = '#/login';
      };

      return (
        <AuthContext.Provider value={{ user, setUser, loading, login, register, logout }}>
          {children}
        </AuthContext.Provider>
      );
    };

    const useAuth = () => useContext(AuthContext);

    // ============================================================================
    // Pages
    // ============================================================================

    // Login Page
    const LoginPage = () => {
      const [email, setEmail] = useState('demo@performancehub.com');
      const [password, setPassword] = useState('demo123');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { login } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        try {
          await login(email, password);
          window.location.hash = '#/';
        } catch (err) {
          setError(err.message || 'Login failed');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-primary-900 via-primary-800 to-primary-600 flex items-center justify-center p-4">
          <div className="glass-card-2xl w-full max-w-md p-8">
            <h1 className="text-3xl font-bold text-primary-900 mb-2" style={{background:"linear-gradient(135deg,#3b82f6,#14b8a6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>PerformanceHub</h1>
            <p className="text-dark-300 mb-6">Fitness Analytics Platform</p>

            {error && (
              <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4">
                {error}
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-dark-200 font-medium mb-2">Email</label>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="demo@performancehub.com"
                  className="w-full px-4 py-2 border border-dark-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-400"
                  required
                />
              </div>

              <div>
                <label className="block text-dark-200 font-medium mb-2">Password</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="demo123"
                  className="w-full px-4 py-2 border border-dark-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-400"
                  required
                />
              </div>

              <button
                type="submit"
                disabled={loading}
                className="w-full bg-primary-600 hover:bg-primary-500 text-white font-bold py-2 px-4 rounded-lg transition disabled:opacity-50"
              >
                {loading ? <span className="spinner" /> : 'Sign In'}
              </button>
            </form>

            <p className="text-center text-dark-300 mt-6">
              Don't have an account?{' '}
              <a href="#/register" className="text-primary-600 hover:text-primary-700 font-medium">
                Sign Up
              </a>
            </p>
          </div>
        </div>
      );
    };

    // Register Page
    const RegisterPage = () => {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { register } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();

    const SettingsPage = () => {
      const [settingsData, setSettingsData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [tab, setTab] = useState('integrations');

      const [oauthMessage, setOauthMessage] = useState('');
      const [filterCat, setFilterCat] = useState('All');
      const [theme, setTheme] = useState('Light');
      const [layout, setLayout] = useState('Standard');
      const [units, setUnits] = useState('Imperial');
      const [notifs, setNotifs] = useState({ 0: true, 1: true, 2: true, 3: false, 4: true });

      useEffect(() => {
        // Check for OAuth callback params
        const params = new URLSearchParams(window.location.search);
        const oauthSuccess = params.get('oauth_success');
        const oauthError = params.get('oauth_error');
        if (oauthSuccess) {
          setOauthMessage(`Successfully connected ${oauthSuccess}!`);
          // Clean up URL
          window.history.replaceState({}, '', '/');
        }
        if (oauthError) {
          setOauthMessage(`OAuth error: ${oauthError}`);
          window.history.replaceState({}, '', '/');
        }

        const fetchSettings = async () => {
          try {
            const res = await fetch('/api/settings');
            if (!res.ok) throw new Error('Failed to fetch settings');
            const data = await res.json();
            setSettingsData(data);
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        };

        fetchSettings();
      }, []);

      const handleConnect = async (platform) => {
        try {
          const res = await fetch(`/api/integrations/${platform}/connect`, {
            method: 'POST',
          });
          if (res.ok) {
            const result = await res.json();
            // If server returns a redirect URL (real OAuth), navigate to it
            if (result.redirect) {
              window.location.href = result.redirect;
              return;
            }
            // Otherwise refresh settings (mock connect)
            const res2 = await fetch('/api/settings');
            if (res2.ok) {
              const data = await res2.json();
              setSettingsData(data);
            }
          }
        } catch (err) {
          console.error('Connect failed:', err);
        }
      };

      const handleDisconnect = async (platform) => {
        try {
          const res = await fetch(`/api/integrations/${platform}`, {
            method: 'DELETE',
          });
          if (res.ok) {
            // Refresh settings
            const res2 = await fetch('/api/settings');
            if (res2.ok) {
              const data = await res2.json();
              setSettingsData(data);
            }
          }
        } catch (err) {
          console.error('Disconnect failed:', err);
        }
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen">
            <div className="spinner" />
          </div>
        );
      }

      if (error) {
        return (
          <div className="p-4 bg-red-50 border border-red-200 text-red-700 rounded">
            Error: {error}
          </div>
        );
      }

      const data = settingsData || {};

      const platformInfo = {
        strava: { name: 'Strava', color: 'bg-orange-100', textColor: 'text-orange-600', category: 'Activity Tracking', badge: 'Connected', badgeColor: 'bg-emerald-900/30 text-green-700', lastSync: '2 hours ago' },
        whoop: { name: 'WHOOP', color: 'bg-teal-100', textColor: 'text-teal-600', category: 'Recovery & Sleep', badge: 'Premium', badgeColor: 'bg-purple-900/30 text-purple-700' },
        garmin: { name: 'Garmin Connect', color: 'bg-primary-800/30', textColor: 'text-primary-400', category: 'Activity Tracking', badge: null, badgeColor: null },
        peloton: { name: 'Peloton', color: 'bg-red-900/30', textColor: 'text-red-400', category: 'Training', badge: null, badgeColor: null },
        myfitnesspal: { name: 'MyFitnessPal', color: 'bg-emerald-900/30', textColor: 'text-emerald-400', category: 'Nutrition', badge: 'Connected', badgeColor: 'bg-emerald-900/30 text-green-700', lastSync: '1 hour ago' },
        applehealth: { name: 'Apple Health', color: 'bg-dark-800/50', textColor: 'text-dark-300', category: 'Health Platform', badge: null, badgeColor: null },
      };

      return (
        <div className="space-y-6">
          {/* Header */}
          <h1 className="text-3xl font-bold text-dark-50">Settings</h1>

          {/* Tabs */}
          <div className="flex gap-4 border-b border-dark-700 overflow-x-auto">
            {['integrations', 'notifications', 'appearance', 'security', 'privacy'].map((t) => (
              <button
                key={t}
                onClick={() => setTab(t)}
                className={`px-4 py-2 font-medium capitalize whitespace-nowrap ${
                  tab === t
                    ? 'text-primary-600 border-b-2 border-primary-600'
                    : 'text-dark-300 hover:text-dark-50'
                }`}
              >
                {t === 'privacy' ? 'Data & Privacy' : t}
              </button>
            ))}
          </div>

          {/* OAuth Status Message */}
          {oauthMessage && (
            <div className={`p-3 rounded-lg text-sm font-medium ${oauthMessage.includes('error') ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`}>
              {oauthMessage}
            </div>
          )}

          {/* Integrations Tab */}
          {tab === 'integrations' && (
            <div className="space-y-6">
              {/* Category Filter */}
              <div className="flex gap-2 overflow-x-auto">
                {['All', 'Activity Tracking', 'Health Platform', 'Recovery & Sleep', 'Training', 'Nutrition'].map((cat) => (
                  <button
                    key={cat}
                    onClick={() => setFilterCat(cat)}
                    className={`px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap ${filterCat === cat ? 'bg-primary-600 text-white' : 'bg-dark-800/50 text-dark-200 hover:bg-dark-600'}`}
                  >
                    {cat}
                  </button>
                ))}
              </div>

              {/* Platforms Grid */}
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {Object.entries(platformInfo).filter(([key, info]) => filterCat === 'All' || info.category === filterCat).map(([key, info]) => {
                  const isConnected = data.connectedPlatforms?.includes(key);

                  return (
                    <div key={key} className="glass-card p-4">
                      <div className={`${info.color} ${info.textColor} w-12 h-12 rounded-lg flex items-center justify-center mb-3 font-bold text-lg`}>
                        {info.name.substring(0, 1)}
                      </div>

                      <h3 className="font-bold text-dark-50 mb-1">{info.name}</h3>
                      <p className="text-xs text-dark-300 mb-3">{info.category}</p>

                      {info.badge && (
                        <span className={`text-xs font-semibold px-2 py-1 rounded mb-2 block ${info.badgeColor}`}>
                          {isConnected ? 'Connected' : info.badge}
                        </span>
                      )}

                      {isConnected && info.lastSync && (
                        <p className="text-xs text-dark-300 mb-3">Last synced: {info.lastSync}</p>
                      )}

                      <div className="space-y-2 mb-3">
                        <p className="text-xs text-dark-300">Data types: Activities, Routes</p>
                      </div>

                      {isConnected ? (
                        <div className="flex gap-2">
                          <button onClick={() => alert(`${info.name} integration settings: Sync frequency, data permissions, and connection status.`)} className="flex-1 bg-dark-700 hover:bg-dark-600 text-dark-200 text-xs font-semibold py-2 px-3 rounded transition">
                            Settings
                          </button>
                          <button
                            onClick={() => handleDisconnect(key)}
                            className="bg-red-900/30 hover:bg-red-200 text-red-700 text-xs font-semibold py-2 px-3 rounded transition"
                          >
                            <Icons.X />
                          </button>
                        </div>
                      ) : (
                        <button
                          onClick={() => handleConnect(key)}
                          className="w-full bg-primary-600 hover:bg-primary-500 text-white text-xs font-semibold py-2 px-4 rounded transition"
                        >
                          Connect
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Other Tabs - Placeholder */}
          {tab === 'notifications' && (
            <div className="space-y-4">
              <div className="glass-card p-6">
                <h2 className="text-xl font-bold text-dark-50 mb-4">Notification Preferences</h2>
                <div className="space-y-4">
                  {[
                    { label: 'Workout Reminders', desc: 'Get reminded about scheduled workouts', on: true },
                    { label: 'Goal Progress', desc: 'Updates when you make progress toward goals', on: true },
                    { label: 'Recovery Alerts', desc: 'Notified when recovery score is low', on: true },
                    { label: 'Social Activity', desc: 'Likes, comments, and group updates', on: false },
                    { label: 'Weekly Summary', desc: 'Email digest of your weekly performance', on: true },
                  ].map((item, idx) => (
                    <div key={idx} className="flex items-center justify-between py-3 border-b border-dark-700 last:border-0">
                      <div>
                        <p className="font-medium text-dark-50">{item.label}</p>
                        <p className="text-sm text-dark-400">{item.desc}</p>
                      </div>
                      <div onClick={() => setNotifs(prev => ({...prev, [idx]: !prev[idx]}))} className={`w-12 h-6 rounded-full cursor-pointer transition ${notifs[idx] ? 'bg-primary-600' : 'bg-dark-600'}`}>
                        <div className={`w-5 h-5 bg-dark-800 rounded-full shadow mt-0.5 transition-transform ${notifs[idx] ? 'translate-x-6' : 'translate-x-0.5'}`} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {tab === 'appearance' && (
            <div className="space-y-4">
              <div className="glass-card p-6">
                <h2 className="text-xl font-bold text-dark-50 mb-4">Appearance</h2>
                <div className="space-y-4">
                  <div>
                    <p className="font-medium text-dark-50 mb-2">Theme</p>
                    <div className="flex gap-3">
                      {['Light', 'Dark', 'System'].map((t) => (
                        <button key={t} onClick={() => setTheme(t)} className={`px-4 py-2 rounded-lg text-sm font-medium border ${t === theme ? 'border-primary-500 bg-primary-600/20 text-primary-300 shadow-glow-blue' : 'border-dark-700 text-dark-300 hover:bg-dark-900'}`}>{t}</button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <p className="font-medium text-dark-50 mb-2">Dashboard Layout</p>
                    <div className="flex gap-3">
                      {['Compact', 'Standard', 'Expanded'].map((l) => (
                        <button key={l} onClick={() => setLayout(l)} className={`px-4 py-2 rounded-lg text-sm font-medium border ${l === layout ? 'border-primary-500 bg-primary-600/20 text-primary-300 shadow-glow-blue' : 'border-dark-700 text-dark-300 hover:bg-dark-900'}`}>{l}</button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <p className="font-medium text-dark-50 mb-2">Units</p>
                    <div className="flex gap-3">
                      {['Imperial (mi, lbs)', 'Metric (km, kg)'].map((u, i) => (
                        <button key={u} onClick={() => setUnits(u)} className={`px-4 py-2 rounded-lg text-sm font-medium border ${u === units ? 'border-primary-500 bg-primary-600/20 text-primary-300 shadow-glow-blue' : 'border-dark-700 text-dark-300 hover:bg-dark-900'}`}>{u}</button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {tab === 'security' && (
            <div className="space-y-4">
              <div className="glass-card p-6">
                <h2 className="text-xl font-bold text-dark-50 mb-4">Security</h2>
                <div className="space-y-4">
                  <div className="flex items-center justify-between py-3 border-b border-dark-700">
                    <div>
                      <p className="font-medium text-dark-50">Password</p>
                      <p className="text-sm text-dark-400">Last changed 30 days ago</p>
                    </div>
                    <button className="bg-dark-800/50 hover:bg-dark-600 text-dark-200 text-sm font-medium py-2 px-4 rounded-lg transition">Change</button>
                  </div>
                  <div className="flex items-center justify-between py-3 border-b border-dark-700">
                    <div>
                      <p className="font-medium text-dark-50">Two-Factor Authentication</p>
                      <p className="text-sm text-dark-400">Add an extra layer of security</p>
                    </div>
                    <button className="bg-primary-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-4 rounded-lg transition">Enable</button>
                  </div>
                  <div className="flex items-center justify-between py-3">
                    <div>
                      <p className="font-medium text-dark-50">Active Sessions</p>
                      <p className="text-sm text-dark-400">1 active session on this device</p>
                    </div>
                    <button className="bg-dark-800/50 hover:bg-dark-600 text-dark-200 text-sm font-medium py-2 px-4 rounded-lg transition">Manage</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {tab === 'privacy' && (
            <div className="space-y-4">
              <div className="glass-card p-6">
                <h2 className="text-xl font-bold text-dark-50 mb-4">Data & Privacy</h2>
                <div className="space-y-4">
                  <div className="flex items-center justify-between py-3 border-b border-dark-700">
                    <div>
                      <p className="font-medium text-dark-50">Profile Visibility</p>
                      <p className="text-sm text-dark-400">Who can see your profile and activities</p>
                    </div>
                    <select className="border border-dark-600 rounded-lg px-3 py-1.5 text-sm">
                      <option>Friends Only</option>
                      <option>Public</option>
                      <option>Private</option>
                    </select>
                  </div>
                  <div className="flex items-center justify-between py-3 border-b border-dark-700">
                    <div>
                      <p className="font-medium text-dark-50">Data Sharing</p>
                      <p className="text-sm text-dark-400">Share anonymized data for research</p>
                    </div>
                    <div className="w-12 h-6 rounded-full cursor-pointer bg-dark-600">
                      <div className="w-5 h-5 bg-dark-800 rounded-full shadow mt-0.5 translate-x-0.5" />
                    </div>
                  </div>
                  <div className="flex items-center justify-between py-3">
                    <div>
                      <p className="font-medium text-dark-50">Export Your Data</p>
                      <p className="text-sm text-dark-400">Download all your data in JSON format</p>
                    </div>
                    <button className="bg-dark-800/50 hover:bg-dark-600 text-dark-200 text-sm font-medium py-2 px-4 rounded-lg transition">Export</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ============================================================================
    // Main App
    // ============================================================================

    const App = () => {
      const { user, loading } = useAuth();
      const [currentHash, setCurrentHash] = useState(window.location.hash);
      const [notificationCount, setNotificationCount] = useState(3);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      useEffect(() => {
        const handleHashChange = () => {
          setCurrentHash(window.location.hash);
          setMobileMenuOpen(false);
        };

        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-dark-800">
            <div className="spinner" />
          </div>
        );
      }

      // Route to appropriate page
      const page = currentHash.slice(2) || '/';

      if (!user && page !== 'login' && page !== 'register') {
        return <LoginPage />;
      }

      if (!user) {
        if (page === 'register') {
          return <RegisterPage />;
        }
        return <LoginPage />;
      }

      // Authenticated pages
      const renderPage = () => {
        if (page === '/' || page === '') return <DashboardPage />;
        if (page === 'workouts') return <WorkoutsPage />;
        if (page === 'reports') return <ReportsPage />;
        if (page === 'goals') return <GoalsPage />;
        if (page === 'groups') return <GroupsPage />;
        if (page === 'feed') return <FeedPage />;
        if (page === 'analyze') return <AnalyzePage />;
        if (page === 'settings') return <SettingsPage />;
        return <DashboardPage />;
      };

      return (
        <div className="min-h-screen bg-dark-900">
          {/* Top Navigation Bar */}
          <nav className="bg-dark-900/95 backdrop-blur-xl text-white shadow-lg shadow-black/20 sticky top-0 z-50 border-b border-dark-700/50">
            <div className="px-4 sm:px-6 py-4">
              <div className="flex items-center justify-between">
                {/* Logo */}
                <div className="flex items-center gap-2 font-bold text-xl">
                  <Icons.Activity />
                  PerformanceHub
                </div>

                {/* Nav Links */}
                <div className="flex items-center gap-6">
                  {[
                    { href: '/', label: 'Dashboard' },
                    { href: '/workouts', label: 'Workouts' },
                    { href: '/reports', label: 'Reports' },
                    { href: '/goals', label: 'Goals' },
                    { href: '/groups', label: 'Groups' },
                    { href: '/feed', label: 'Feed' },
                    { href: '/analyze', label: 'Analyze' },
                  ].map(({ href, label }) => {
                    const isActive = currentHash === `#${href}` || (href === '/' && (currentHash === '' || currentHash === '#/' || currentHash === '#'));

                    return (
                      <a
                        key={href}
                        href={`#${href}`}
                        className={`text-sm font-medium transition px-2 py-3 min-h-[44px] inline-flex items-center ${
                          isActive
                            ? 'text-white font-semibold border-b-2 border-primary-400 pb-0.5'
                            : 'text-dark-400 hover:text-white transition-colors duration-200'
                        } hidden md:inline-flex`}
                      >
                        {label}
                      </a>
                    );
                  })}
                </div>

                {/* Right Side: Notification, Settings, User, Hamburger */}
                <div className="flex items-center gap-4">
                  {/* Mobile hamburger */}
                  <button
                    className="md:hidden text-white p-2 min-w-[44px] min-h-[44px] flex items-center justify-center -mr-2"
                    onClick={() => setMobileMenuOpen(prev => !prev)}
                    aria-label="Toggle menu"
                    aria-expanded={mobileMenuOpen}
                  >
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      {mobileMenuOpen
                        ? <path d="M18 6L6 18M6 6l12 12" />
                        : <><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></>
                      }
                    </svg>
                  </button>

                  <button onClick={() => alert('No new notifications')} className="relative hidden sm:block">
                    <Icons.Bell />
                    {notificationCount > 0 && (
                      <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">
                        {notificationCount}
                      </span>
                    )}
                  </button>

                  <a href="#/settings" className="hover:text-blue-100 transition hidden sm:block">
                    <Icons.Settings />
                  </a>

                  <div className="flex items-center gap-2 border-l border-blue-400 pl-4">
                    <div className="w-8 h-8 rounded-full bg-blue-300 text-primary-900 text-xs font-bold flex items-center justify-center">
                      {user.name
                        .split(' ')
                        .map((n) => n[0])
                        .join('')}
                    </div>
                    <span className="text-sm hidden sm:inline">{user.name}</span>
                  </div>
                </div>
              </div>
            </div>

            {/* Mobile Nav Menu */}
            {mobileMenuOpen && (
              <div className="md:hidden bg-primary-700 px-6 py-3 space-y-2">
                {[
                  { href: '/', label: 'Dashboard' },
                  { href: '/workouts', label: 'Workouts' },
                  { href: '/reports', label: 'Reports' },
                  { href: '/goals', label: 'Goals' },
                  { href: '/groups', label: 'Groups' },
                  { href: '/feed', label: 'Feed' },
                  { href: '/analyze', label: 'Analyze' },
                  { href: '/settings', label: 'Settings' },
                ].map(({ href, label }) => {
                  const isActive = currentHash === `#${href}` || (href === '/' && (currentHash === '' || currentHash === '#/' || currentHash === '#'));
                  return (
                    <a
                      key={href}
                      href={`#${href}`}
                      className={`block py-3 px-2 min-h-[44px] text-sm font-medium transition ${isActive ? 'text-white bg-primary-600 rounded' : 'text-blue-300 hover:text-white'}`}
                    >
                      {label}
                    </a>
                  );
                })}
              </div>
            )}

            {/* Secondary Bar */}
            <div className="bg-primary-700 px-6 py-2 hidden md:flex items-center justify-between text-sm">
              <div className="flex items-center gap-4">
                <select className="bg-transparent text-white focus:outline-none text-xs">
                  <option>Last 7 Days</option>
                  <option>Last 30 Days</option>
                  <option>Last 90 Days</option>
                </select>
                <button onClick={() => window.location.reload()} className="text-dark-400 hover:text-white transition-colors duration-200">
                  <Icons.RefreshCw />
                </button>
                <button onClick={() => alert('Export data feature coming soon!')} className="text-dark-400 hover:text-white transition-colors duration-200">
                  <Icons.Download />
                </button>
              </div>

              <div className="flex items-center gap-4">
                <a href="#/settings" className="text-dark-400 hover:text-white transition-colors duration-200 text-xs">
                  Switch to Coach
                </a>
                <button
                  onClick={() => {
                    fetch('/api/auth/logout', { method: 'POST' })
                      .then(() => {
                        window.location.hash = '#/login';
                        window.location.reload();
                      })
                      .catch(console.error);
                  }}
                  className="text-dark-400 hover:text-white transition-colors duration-200 text-xs"
                >
                  Sign Out
                </button>
              </div>
            </div>
          </nav>

          {/* Main Content */}
          <main className="px-4 sm:px-6 py-4 sm:py-6">
            <div className="max-w-7xl mx-auto">
              {renderPage()}
            </div>
          </main>
        </div>
      );
    };

    // ============================================================================
    // Render App
    // ============================================================================

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AuthProvider>
        <App />
      </AuthProvider>
    );
  </script>
</body>
</html>
